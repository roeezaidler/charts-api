apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: charts-api-role
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  # Service URL discovery
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Node info (for NodePort IP discovery)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

apiVersion: apps/v1
kind: Deployment
metadata:
  name: charts-api
  labels:
    app: charts-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: charts-api
  template:
    metadata:
      labels:
        app: charts-api
    spec:
      serviceAccountName: charts-api
      containers:
        - name: charts-api
          image: docker.artifactory.nsogroup.com/infra/users-charts-api:0.24
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: CHARTS_API_K8S_IN_CLUSTER
              value: "true"
            - name: CHARTS_API_CA_BUNDLE_PATH
              value: "/etc/ssl/certs/internal-ca.crt"
            - name: CHARTS_API_RANCHER_URL
              valueFrom:
                configMapKeyRef:
                  name: charts-api-config
                  key: rancher-url
            - name: CHARTS_API_RANCHER_CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: charts-api-config
                  key: rancher-cluster-id
            - name: CHARTS_API_RANCHER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: charts-api-secrets
                  key: rancher-token
            - name: CHARTS_API_ARTIFACTORY_HELM_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: charts-api-config
                  key: artifactory-helm-repo-url
            - name: CHARTS_API_ARTIFACTORY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: charts-api-secrets
                  key: artifactory-username
                  optional: true
            - name: CHARTS_API_ARTIFACTORY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: charts-api-secrets
                  key: artifactory-password
                  optional: true
            - name: CHARTS_API_LDAP_SERVER
              valueFrom:
                configMapKeyRef:
                  name: charts-api-config
                  key: ldap-server
            - name: CHARTS_API_LDAP_BASE_DN
              valueFrom:
                configMapKeyRef:
                  name: charts-api-config
                  key: ldap-base-dn
            - name: CHARTS_API_LDAP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: charts-api-secrets
                  key: ldap-username
            - name: CHARTS_API_LDAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: charts-api-secrets
                  key: ldap-password
            - name: CHARTS_API_LITELLM_URL
              value: "http://litellm-service.litellm.svc.cluster.local"
            - name: CHARTS_API_LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: charts-api-secrets
                  key: litellm-master-key
                  optional: true
          volumeMounts:
            - name: internal-ca
              mountPath: /etc/ssl/certs/internal-ca.crt
              subPath: ca.crt
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: internal-ca
          configMap:
            name: charts-api-internal-ca

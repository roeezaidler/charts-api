argo-cd:
  # High Availability
  redis-ha:
    enabled: true
  controller:
    replicas: 1
  server:
    replicas: 2
  repoServer:
    replicas: 2
  applicationSet:
    replicas: 2

  # Global
  global:
    domain: user-charts-argocd.nsogroup.com  # TODO: set your ArgoCD domain

  namespaceOverride: "user-charts"  # Shared namespace for ArgoCD + charts-api

  configs:
    repositories:
      # Artifactory Helm repos where MCP server / agent charts are stored
      helm-devops:
        type: helm
        url: https://artifactory.nsogroup.com/artifactory/devops-helm-release-local
        name: helm-devops
        username: builduser
        password: REPLACE_WITH_ARTIFACTORY_PASSWORD
      helm-virtual:
        type: helm
        url: https://artifactory.nsogroup.com/artifactory/helm
        name: helm-virtual
        username: builduser
        password: REPLACE_WITH_ARTIFACTORY_PASSWORD
      helm-oci-artifactory:
        type: helm
        url: docker.artifactory.nsogroup.com
        name: helm-oci-artifactory
        enableOCI: "true"
        username: builduser
        password: REPLACE_WITH_ARTIFACTORY_PASSWORD
      # TODO: add a Bitbucket repo here once it's created for MCP chart sources

    tls:
      certificates:
        # Internal CA certs so ArgoCD can connect to Artifactory and Bitbucket over HTTPS
        docker.artifactory.nsogroup.com: |
          -----BEGIN CERTIFICATE-----
          REPLACE_WITH_YOUR_INTERNAL_CA_CERT
          -----END CERTIFICATE-----
        artifactory.nsogroup.com: |
          -----BEGIN CERTIFICATE-----
          REPLACE_WITH_YOUR_INTERNAL_CA_CERT
          -----END CERTIFICATE-----

    secret:
      argocdServerAdminPassword: "REPLACE_WITH_BCRYPT_HASH"

  server:
    service:
      type: LoadBalancer
      loadBalancerClass: kube-vip.io/kube-vip-class
      loadBalancerIP: "REPLACE_WITH_LB_IP"  # TODO: allocate an IP from your pool
    certificateSecret:
      enabled: true
      ca: |
        -----BEGIN CERTIFICATE-----
        REPLACE_WITH_CA_CERT
        -----END CERTIFICATE-----
      key: |
        -----BEGIN RSA PRIVATE KEY-----
        REPLACE_WITH_SERVER_KEY
        -----END RSA PRIVATE KEY-----
      crt: |
        -----BEGIN CERTIFICATE-----
        REPLACE_WITH_SERVER_CERT
        -----END CERTIFICATE-----
